name: Scrape Rates

on:
  schedule:
    - cron: '0 8 * * *' # Run daily at 8:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: server

      - name: Run Scraper
        run: npm run get-rates latest
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          PUBLIC_PUSH_NOTIFICATION_VAPID_KEY: ${{ secrets.PUBLIC_PUSH_NOTIFICATION_VAPID_KEY }}
          PRIVATE_PUSH_NOTIFICATION_VAPID_KEY: ${{ secrets.PRIVATE_PUSH_NOTIFICATION_VAPID_KEY }}
